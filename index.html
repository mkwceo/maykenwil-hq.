<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MAYKENWIL OS — Command Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maykenwil OS">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
</head>
<body>
<div class="bg"></div><div class="bg-grid"></div><div class="bg-scan"></div>

<div class="deck">

  <!-- STATUS BAR -->
  <header class="statusbar boot">
    <div class="brand">
      <div class="brand-mark">MKW</div>
      <div>
        <b data-decrypt id="os-name">MAYKENWIL OS</b>
        <span id="founder">— · —</span>
      </div>
    </div>
    <div class="sysline" id="sysline"></div>
    <div class="clock"><span id="clock">--:--:--</span><small id="date">—</small></div>
  </header>

  <div class="grid">

    <!-- LEFT -->
    <div class="col">
      <section class="hud mission boot">
        <div class="hud-label">Compte à rebours · Lancement</div>
        <div class="cd" id="countdown">
          <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-lab">Jours</div></div>
          <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-lab">Heures</div></div>
          <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-lab">Min</div></div>
          <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-lab">Sec</div></div>
        </div>
        <div class="target" id="launch-target">—</div>
      </section>

      <section class="hud boot">
        <div class="hud-label">Décision · GO / NO-GO</div>
        <div class="gauge-wrap">
          <div class="gauge">
            <svg width="108" height="108" viewBox="0 0 108 108">
              <circle class="trk" cx="54" cy="54" r="48"></circle>
              <circle class="fil" cx="54" cy="54" r="48" id="gfill"></circle>
            </svg>
            <div class="gauge-c"><b id="gscore">0</b><span>/ 100</span></div>
          </div>
          <div class="verdict" id="verdict">—<small id="verdict-note"></small></div>
        </div>
      </section>

      <section class="hud boot">
        <div class="hud-label">Système</div>
        <div class="kv" id="kv"></div>
      </section>
    </div>

    <!-- CENTER -->
    <div class="col col-center">
      <section class="hud boot">
        <div class="hud-label">Branches · <span id="bcount">0</span> unités</div>
        <div class="branches" id="branches"></div>
      </section>
    </div>

    <!-- RIGHT -->
    <div class="col">
      <section class="hud brain boot">
        <div class="hud-label">Second cerveau</div>
        <div class="cmd">
          <span class="led"></span>
          <input id="cmd" type="text" placeholder="Commande tes agents…">
          <button id="cmd-send" title="Ouvrir Claude" aria-label="Envoyer">➤</button>
        </div>
        <div class="hint">↵ ENTRÉE → ouvre Claude · ton cerveau opérationnel</div>
      </section>

      <section class="hud boot">
        <div class="hud-label">Stack · Apps</div>
        <div class="apps" id="apps"></div>
      </section>
    </div>
  </div>
</div>

<!-- OVERLAY DÉTAIL BRANCHE -->
<div class="ov" id="ov"><div class="ov-box" id="ov-box"></div></div>

<script src="app.js" defer></script>
</body>
</html>
