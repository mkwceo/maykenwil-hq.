<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Maykenwil HQ</title>
  <meta name="description" content="Dashboard de pilotage — Maykenwil Holding" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="wallpaper" id="wallpaper"></div>
  <div class="wallpaper-glow"></div>

  <div class="screen">
    <!-- Horloge écran verrouillé -->
    <header class="lockclock animate-pop">
      <div class="lc-date" id="lc-date">—</div>
      <div class="lc-time">
        <span id="lc-hh">00</span><span class="lc-colon" id="lc-colon">:</span><span id="lc-mm">00</span><span class="lc-sec" id="lc-ss">00</span>
      </div>
      <div class="lc-holding" id="lc-holding"></div>
    </header>

    <!-- Panneau verre dépoli -->
    <main class="sheet animate-up">
      <div class="sheet-handle"></div>

      <div class="sheet-head">
        <h1 class="sheet-title">Vue d'ensemble</h1>
        <span class="sheet-pill" id="sheet-verdict"></span>
      </div>

      <section class="widget-grid" id="widgets"></section>

      <div class="section-cap">Mes branches</div>
      <section class="tile-grid" id="branches"></section>
    </main>

    <!-- Dock -->
    <nav class="dock" id="dock" aria-label="Applications"></nav>
  </div>

  <!-- Modal détail branche -->
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true"></div>

  <script src="app.js" defer></script>
</body>
</html>
