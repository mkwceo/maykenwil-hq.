<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maykenwil HQ</title>
  <meta name="description" content="Dashboard de pilotage — Maykenwil Holding" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">

      <div class="sidebar-brand">
        <div class="brand-mark" id="brand-mark">M</div>
        <div class="brand-text">
          <span class="brand-name" id="brand-name">Maykenwil HQ</span>
          <span class="brand-sub">Holding</span>

      </div>

      <nav class="nav" id="nav" aria-label="Navigation principale"></nav>

      <div class="sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <main class="main">
      <button class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>
      <div class="view" id="view"></div>
    </main>
  </div>

  <div class="scrim" id="scrim"></div>

  <script src="app.js" defer></script>

</html>
